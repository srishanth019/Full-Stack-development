<!DOCTYPE html>
<head>
  <title>GameZone</title>

  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Orbitron', sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      color: #fff;
    }

    header {
      background: #000;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    }

    header h1 {
      color: #00ffcc;
      font-size: 28px;
    }

    nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.3s;
    }

    nav a:hover {
      color: #00ffcc;
    }

    .hero {
      height: 80vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: url('https://images.unsplash.com/photo-1542751371-adc38448a05e') center/cover no-repeat;
    }

    .hero h2 {
      font-size: 48px;
      margin-bottom: 15px;
      text-shadow: 0 0 20px #000;
    }

    .hero p {
      font-size: 18px;
      margin-bottom: 25px;
      max-width: 600px;
      text-shadow: 0 0 10px #000;
    }

    .hero a {
      padding: 15px 40px;
      background: #00ffcc;
      color: #000;
      text-decoration: none;
      border-radius: 30px;
      font-weight: 600;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .hero a:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00ffcc;
    }

    /* Games Section */
    .games {
      padding: 60px 40px;
      text-align: center;
    }

    .games h2 {
      font-size: 36px;
      margin-bottom: 40px;
      color: #00ffcc;
    }

    .game-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
    }

    .game-card {
      background: #111;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 15px rgba(0,0,0,0.8);
      transition: transform 0.3s;
    }

    .game-card:hover {
      transform: translateY(-10px);
    }

    .game-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .game-card h3 {
      padding: 15px;
      font-size: 18px;
    }

    footer {
      background: #000;
      padding: 20px;
      text-align: center;
      font-size: 14px;
      color: #aaa;
    }
  </style>
</head>
<body>

  <header>
    <h1>GameZone</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#games">Games</a>
      <a href="#">Community</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="hero">
    <h2>Level Up Your Gaming</h2>
    <p>Discover epic games, legendary battles, and immersive worlds — all in one place.</p>
    <a href="#games">Explore Games</a>
  </section>

  <section class="games" id="games">
    <h2>Popular Games</h2>
    <div class="game-grid">
      <div class="game-card">
        <img src="https://images.unsplash.com/photo-1605902711622-cfb43c4437b5" alt="Game 1">
        <h3>Cyber Battle</h3>
      </div>
      <div class="game-card">
        <img src="https://images.unsplash.com/photo-1580128637393-3a59fdf8d2e1" alt="Game 2">
        <h3>Racing X</h3>
      </div>
      <div class="game-card">
        <img src="https://i.ytimg.com/vi/taupMUXLcRE/maxresdefault.jpg" alt="Game 3">
        <h3>Fantasy Quest</h3>
      </div>
    </div>
  </section>

  <footer>
    © 2026 GameZone | All Rights Reserved
  </footer>

</body>
</html>
