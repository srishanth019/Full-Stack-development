<!DOCTYPE html>
<head>
  <title>Premium Full Stack Website</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #1e1e2f, #2c2c54);
      color: white;
    }

    .card {
      border-radius: 15px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    .hidden { display: none; }

    .btn-custom {
      border-radius: 25px;
      padding: 10px 20px;
    }

    input {
      border-radius: 10px !important;
    }

    .container-box {
      max-width: 400px;
      margin: auto;
      margin-top: 80px;
    }

    .dashboard-box {
      margin-top: 50px;
    }

    .fade-in {
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<div class="container container-box fade-in" id="registerPage">
  <div class="card p-4 bg-dark text-white">
    <h3 class="text-center mb-3">Create Account</h3>

    <input id="regName" class="form-control mb-3" placeholder="Full Name">
    <input id="regEmail" class="form-control mb-3" placeholder="Email">
    <input id="regPass" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-primary btn-custom w-100" onclick="register()">Register</button>
    <p id="regMsg" class="text-danger mt-2 text-center"></p>

    <p class="text-center mt-3">Already have account? 
      <a href="#" onclick="showLogin()" class="text-info">Login</a>
    </p>
  </div>
</div>

<div class="container container-box hidden fade-in" id="loginPage">
  <div class="card p-4 bg-dark text-white">
    <h3 class="text-center mb-3">Welcome Back</h3>

    <input id="loginEmail" class="form-control mb-3" placeholder="Email">
    <input id="loginPass" type="password" class="form-control mb-3" placeholder="Password">

    <button class="btn btn-success btn-custom w-100" onclick="login()">Login</button>
    <p id="loginMsg" class="text-danger mt-2 text-center"></p>
  </div>
</div>

<div class="container dashboard-box hidden fade-in" id="dashboard">
  <div class="card p-4 bg-dark text-white">
    <h3 class="text-center">Dashboard</h3>

    <div class="text-center mt-3">
      <button class="btn btn-info btn-custom me-2" onclick="toggleData()">Show/Hide Data</button>
      <button class="btn btn-danger btn-custom" onclick="logout()">Logout</button>
    </div>

    <div id="dataBox" class="card p-3 mt-4 bg-light text-dark">
      <h5>User Info</h5>
      <p id="userData"></p>
    </div>
  </div>
</div>

<script>
  let user = JSON.parse(localStorage.getItem("user")) || {};

  function register() {
    let name = document.getElementById("regName").value;
    let email = document.getElementById("regEmail").value;
    let pass = document.getElementById("regPass").value;

    if (name === "" || email === "" || pass === "") {
      document.getElementById("regMsg").innerText = "All fields are required";
      return;
    }

    user = { name, email, pass };
    localStorage.setItem("user", JSON.stringify(user));

    document.getElementById("regMsg").innerText = "Registered Successfully!";
    showLogin();
  }

  function showLogin() {
    document.getElementById("registerPage").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
  }

  function login() {
    let email = document.getElementById("loginEmail").value;
    let pass = document.getElementById("loginPass").value;

    if (email === user.email && pass === user.pass) {
      document.getElementById("loginPage").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
      document.getElementById("userData").innerText = `Name: ${user.name}\nEmail: ${user.email}`;
    } else {
      document.getElementById("loginMsg").innerText = "Invalid Email or Password";
    }
  }

  function toggleData() {
    document.getElementById("dataBox").classList.toggle("hidden");
  }

  function logout() {
    document.getElementById("dashboard").classList.add("hidden");
    document.getElementById("loginPage").classList.remove("hidden");
  }
</script>

</body>
</html>
